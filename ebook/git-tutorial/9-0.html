  <h1>自定义 Git</h1>

  <p>
    在
    <a href="2-0.html">安装 Git</a>
    一节中，我们已经配置了
    <code>user.name</code>
    和
    <code>user.email</code>
    ，实际上，Git 还有很多可配置项。
  </p>

  <p>比如，让 Git 显示颜色，会让命令输出看起来更醒目：</p>

  <pre><code>$ git config --global color.ui true</code></pre>

  <p>
    这样，Git 会适当地显示不同的颜色，比如
    <code>git status</code>
    命令：
  </p>

  <p>
    <img src="img/9-0-0.png" alt="9-0-0" />
  </p>

  <p>文件名就会标上颜色。</p>

  <p>我们在后面还会介绍如何更好地配置 Git，以便让你的工作更高效。</p>
