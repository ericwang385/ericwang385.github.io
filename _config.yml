# Site settings
title: Eric wang
SEOTitle: psyduck's blog
header-img: img/Mono Wall.jpg
email: eric.w385@gmail.com
description: ""
keyword: ""
url: "http://ericwang385.github.io"              # your host, for absolute URL
baseurl: ""                             # for example, '/blog' if your blog hosted on 'host/blog'

# SNS settings
#weibo_username: jsksxs360
zhihu_username: wang-cheng-yuan-5
github_username: ericwang385

# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
highlighter: rouge
permalink: pretty
paginate: 10
exclude: ["less","node_modules","Gruntfile.js","package.json","README.md","README.zh.md"]
anchorjs: true                          # if you want to customize anchor. check out line:181 of `post.html`

# Gems
# to support local preview for Jekyll 3.0
gems: [jekyll-paginate]

# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
kramdown:
  input: GFM                            # use Github Flavored Markdown !important

# UY comment
uy: true                               # whether or not using uy comment
uy_uid: 2139621

# Baidu Share
bd_share: true                          # whether or not using baidu share

# Analytics settings
# Baidu Analytics
ba_track_id: b576afa48b7cd942e1a8c455b0d75234

# Sidebar settings
sidebar: true                           # whether or not using Sidebar.
sidebar-about-description: "一只什么都想学的蠢鸭子"
sidebar-avatar: /img/face.jpeg      # use absolute URL, seeing it's used in both `/` and `/about/`

# Featured Tags
featured-tags: true                     # whether or not using Feature-Tags
featured-condition-size: 1              # A tag will be featured if the size of it is more than this condition value

